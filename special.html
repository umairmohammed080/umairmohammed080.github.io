<!DOCTYPE html>
<html>
<head>
    <title>For My Zaraji 🎀</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        body {
            text-align: center;
            font-family: 'Pacifico', cursive;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ff4da6, #cc0066); /* darker pink */
        }

        h1 {
            margin-top: 120px;
            font-size: 42px;
            color: white;
            text-shadow: 3px 3px 15px #800040;
            animation: fadeIn 2s ease;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            margin: 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 1.0s;
        }

        button:hover {
            transform: scale(1.15);
        }

        #yesBtn {
            background-color: white;
            color: hotpink;
        }

        #noBtn {
            position: absolute;
            background-color: #eee;
        }

        .heart {
            position: absolute;
            color: #ff99cc;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(1); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

<!-- AUTO MUSIC -->
<audio id="bgMusic" autoplay loop muted>
    <source src="YOUR_MP3_LINK_HERE.mp3" type="audio/mpeg">
</audio>

<div id="content">
    <h1>Are you readyyyy ? 😝</h1>
    <button onclick="nextStep()">Yesssss 😍</button>
    <button id="noBtn" onmouseover="moveButton()">No ☹️ (pls dont choose)</button>
</div>

<script>
function nextStep() {
    document.getElementById("content").innerHTML = `
        <h1>Zara, will you be my girlfriend? 💖</h1>
        <button onclick="yesClicked()">OMG YESS 💕</button>
        <button id="noBtn" onmouseover="moveButton()">No 🥲</button>
    `;
}

function yesClicked() {
    document.body.innerHTML = "<h1 style='color:white;margin-top:150px;'>YAAYYYY now ur mine meri jaan 💖💖💖</h1>";
}

function moveButton() {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    document.getElementById("noBtn").style.left = x + "px";
    document.getElementById("noBtn").style.top = y + "px";
}

// MORE HEARTS ✨
function createHeart() {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 25 + 20 + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

// increase frequency = more hearts
setInterval(createHeart, 120);

// AUTO-UNMUTE FIX (after tiny interaction)
window.addEventListener("click", () => {
    let music = document.getElementById("bgMusic");
    music.muted = false;
    music.play();
});
</script>

</body>
</html>
